<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tic-tac-toe</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<section id="scoreboard">
			<ul>
				<li><p id="playerScore"></p></ul>
				<li><p id="computerScore"></p></ul>
			</ul>
		</section>
		<section id="game">
			<div id="status"></div>
			<div><button id="playerMarker">X</button></div>			
			<div id="board">
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
			</div>
			<div><button id="reset">Rematch</button></div>
		</section>
		<script src="./main.js"></script>
	</body>
</html>
