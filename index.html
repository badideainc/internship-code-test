<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tic-tac-toe</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<section id="scoreboard">
			<div class="score">
						<img src="images/cell_light.png" alt="Player" class="scoreImage">
						<p id="playerScore"></p>
			</div>
			<div class="score">
						<img src="images/cell_light.png" alt="Robit" class="scoreImage">
						<p id="computerScore"></p>
			</div>
		</section>
		<div id="status"></div>
		<div><button id="playerMarker">X</button></div>		
		<section id="game">			
			<div id="board">
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
				<button class="cell"></button>
			</div>			
		</section>
		<div id="resetDiv"><button id="reset">Rematch</button></div>
		<script src="./main.js"></script>
	</body>
</html>
